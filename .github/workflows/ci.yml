name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shortr_test
          POSTGRES_USER: shortr
          POSTGRES_PASSWORD: shortr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run migrations
        run: psql postgres://shortr:shortr@localhost:5432/shortr_test -f migrations/001_init.sql

      - name: Run tests
        env:
          DATABASE_URL: postgres://shortr:shortr@localhost:5432/shortr_test?sslmode=disable
          JWT_SECRET: test-secret
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shortr:${{ github.sha }} .
