services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shortr
      POSTGRES_USER: shortr
      POSTGRES_PASSWORD: shortr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://shortr:shortr@db:5432/shortr?sslmode=disable
      JWT_SECRET: change-me-in-production
      PORT: "8080"
    depends_on:
      - db

volumes:
  pgdata:
